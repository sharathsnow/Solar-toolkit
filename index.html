
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

/* LOGIN SAME */
#loginScreen{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#111,#333);
}

.login-box{
  background:#fff;
  padding:25px;
  width:300px;
  border-radius:10px;
  text-align:center;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  background:#111;
  color:#fff;
  padding:12px;
}
.header h1{font-size:16px;margin:0;flex:1}

/* INFO */
.info-icon{
  width:26px;height:26px;
  border-radius:50%;
  background:#fff;color:#111;
  display:flex;align-items:center;justify-content:center;
}

/* LAYOUT */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* SIDEBAR (DESKTOP) */
.sidebar{
  width:200px;
  background:#1e1e1e;
  display:flex;
  flex-direction:column;
  padding-top:10px;
}

.sidebar button{
  padding:14px;
  border:none;
  background:none;
  color:#bbb;
  text-align:left;
  font-size:14px;
  cursor:pointer;
  transition:0.2s;
}

.sidebar button:hover{
  background:#333;
  color:#fff;
}

.sidebar button.active{
  background:#007bff;
  color:#fff;
  font-weight:bold;
}

/* CONTENT */
.content{
  flex:1;
  padding:15px;
  overflow:auto;
}

/* BOX */
.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* BUTTONS */
button.calculate-btn{
  background:#007bff;
  color:#fff;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  width:100%;
}

input,select{
  width:100%;
  padding:10px;
  margin:8px 0;
}

.output{
  margin-top:10px;
  background:#eef5ff;
  padding:10px;
  border-left:4px solid #007bff;
}

/* MOBILE NAV */
@media(max-width:768px){

  .container{
    flex-direction:column;
  }

  .sidebar{
    position:fixed;
    bottom:0;
    width:100%;
    height:60px;
    flex-direction:row;
    z-index:1000;
  }

  .sidebar button{
    flex:1;
    text-align:center;
    font-size:12px;
  }

  .content{
    padding-bottom:70px;
  }
}
</style>
