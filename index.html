
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solar Toolkit</title>

  <!-- LINK CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

  <div class="header">Solar Toolkit</div>

  <div class="content">

    <div id="mms" class="page active">
      <div class="card">
        <h3>MMS</h3>
        <input id="mmsTables" type="number" placeholder="Tables">
        <button onclick="calcMMS()">Calculate</button>
        <div id="mmsOut" class="output"></div>
      </div>
    </div>

    <div id="piling" class="page">
      <div class="card">
        <h3>Piling</h3>
        <input id="pileTables" type="number">
        <button onclick="calcPiling()">Calculate</button>
        <div id="pileOut" class="output"></div>
      </div>
    </div>

  </div>

  <div class="bottom-nav">
    <button onclick="openTab('mms',this)" class="active">MMS</button>
    <button onclick="openTab('piling',this)">Piling</button>
  </div>

</div>

<!-- LINK JS -->
<script src="script.js"></script>

</body>
</html>
